<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Web Crawler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">

        <h1>SEO Web Crawler</h1>

        <label for="url">URL:</label>

        <input
            type="text"
            id="url"
            placeholder="Enter Website URL"
            required
        >

        <button type="button" id="crawlBtn">
            Crawl Website
        </button>

        <div id="loading"></div>

        <div id="results"></div>

    </main>

    <script src="script.js"></script>

</body>
</html>
